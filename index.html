<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#007B5F" />
  <meta name="description" content="Humanitarian news digest with Australian interest priority" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HumanDigest" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Humanitarian Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Montserrat:wght@700&family=Zilla+Slab:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ADRA Brand Colours */
      --primary: #007B5F;        /* ADRA Green */
      --primary-dark: #005f49;   /* ADRA Green darkened for hover */
      --primary-light: #e6f4f0;  /* ADRA Green tint for badges/backgrounds */
      --secondary: #54585A;      /* ADRA Dark Grey */
      --au-gold: #ffcc02;        /* Australian alert accent */
      --danger: #c0392b;
      --bg: #f2f5f4;
      --card: #ffffff;
      --text: #000000;           /* ADRA Black */
      --muted: #54585A;          /* ADRA Dark Grey */
      --border: #d9e5e2;
      --weekly-border: #007B5F;  /* ADRA Green for weekly cards */
      --daily-border: #54585A;   /* ADRA Dark Grey for daily cards */
    }

    body {
      font-family: 'Zilla Slab', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* HEADER */
    header {
      background: var(--primary);
      color: white;
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header .back-btn {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      padding: 0 8px 0 0;
      line-height: 1;
    }

    header .back-btn.visible { display: block; }

    header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 17px;
      font-weight: 700;
      flex: 1;
      letter-spacing: 0;
    }

    header .tagline {
      font-family: 'Kaushan Script', cursive;
      font-size: 11px;
      opacity: 0.85;
      display: block;
      font-weight: 400;
      margin-top: 1px;
    }

    header .flag { font-size: 22px; }

    /* MAIN */
    main { padding: 16px; max-width: 680px; margin: 0 auto; }

    /* LIST VIEW */
    #list-view {}

    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--secondary);
      margin: 20px 0 10px;
    }

    .digest-card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      border-left: 4px solid var(--daily-border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .digest-card:active { transform: scale(0.98); }

    .digest-card.weekly {
      border-left-color: var(--weekly-border);
    }

    .digest-card .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .digest-card .type-badge {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--primary-light);
      color: var(--primary);
    }

    .digest-card.weekly .type-badge {
      background: var(--primary-light);
      color: var(--primary);
    }

    .digest-card .card-date {
      font-size: 12px;
      color: var(--muted);
    }

    .digest-card h3 {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 6px;
    }

    .digest-card .preview {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .digest-card .au-flag {
      display: inline-block;
      margin-right: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Montserrat', sans-serif; font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* DETAIL VIEW */
    #detail-view { display: none; }

    .digest-meta {
      background: var(--card);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .digest-meta .meta-type {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--primary);
    }

    .digest-meta .meta-date {
      font-size: 13px;
      color: var(--muted);
    }

    .digest-content {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      line-height: 1.7;
    }

    /* Markdown styles */
    .digest-content h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 19px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .digest-content h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      margin-top: 24px;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--primary);
    }

    .digest-content h2:first-of-type { margin-top: 16px; }

    /* Australian priority section — gold underline */
    .digest-content h2:first-of-type {
      color: var(--primary);
      border-bottom-color: var(--au-gold);
    }

    .digest-content p {
      font-family: 'Zilla Slab', Georgia, serif;
      font-size: 15px;
      margin-bottom: 12px;
      color: var(--text);
      line-height: 1.7;
    }

    .digest-content strong {
      color: var(--primary);
      font-weight: 600;
    }

    .digest-content em {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      color: var(--muted);
      font-style: normal;
      letter-spacing: 0.3px;
    }

    .digest-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .digest-content ul {
      padding-left: 18px;
      margin-bottom: 12px;
    }

    .digest-content li {
      font-family: 'Zilla Slab', Georgia, serif;
      font-size: 15px;
      margin-bottom: 6px;
      line-height: 1.6;
    }

    .digest-content a {
      color: var(--primary);
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 123, 95, 0.35);
    }

    .digest-content blockquote {
      border-left: 3px solid var(--primary);
      padding-left: 14px;
      margin: 12px 0;
      color: var(--muted);
      font-size: 14px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 20px;
      opacity: 0.6;
    }

    /* Refresh button */
    .refresh-btn {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      opacity: 0.85;
    }

    .refresh-btn:active { opacity: 0.5; }
  </style>
</head>
<body>

<header>
  <button class="back-btn" id="back-btn" onclick="showList()">‹</button>
  <h1 id="header-title">Humanitarian Digest <span class="tagline">Justice. Compassion. Love.</span></h1>
  <span class="flag">🌍</span>
  <button class="refresh-btn" onclick="loadDigests()" title="Refresh">↻</button>
</header>

<main>
  <!-- LIST VIEW -->
  <div id="list-view">
    <div id="digests-container">
      <div class="loading"><div class="spinner"></div>Loading digests…</div>
    </div>
    <div class="footer-note">🇦🇺 Australian interest priority · Updated automatically</div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view">
    <div class="digest-meta">
      <span class="meta-type" id="detail-type"></span>
      <span class="meta-date" id="detail-date"></span>
    </div>
    <div class="digest-content" id="detail-content"></div>
    <div class="footer-note" style="margin-top:16px;">End of digest</div>
  </div>
</main>

<script>
  const BASE = './digests/';
  let allDigests = [];

  async function loadDigests() {
    document.getElementById('digests-container').innerHTML =
      '<div class="loading"><div class="spinner"></div>Loading digests…</div>';
    try {
      const res = await fetch(BASE + 'index.json?t=' + Date.now());
      const data = await res.json();
      allDigests = data.sort((a, b) => new Date(b.date) - new Date(a.date));
      renderList();
    } catch (e) {
      document.getElementById('digests-container').innerHTML = `
        <div class="empty-state">
          <div class="icon">🌍</div>
          <h3>No digests yet</h3>
          <p>Your first digest will appear here Monday at 8am.<br>Daily updates follow Tuesday–Sunday.</p>
        </div>`;
    }
  }

  function renderList() {
    const container = document.getElementById('digests-container');
    if (!allDigests.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">🌍</div>
          <h3>No digests yet</h3>
          <p>Your first digest will appear here Monday at 8am.<br>Daily updates follow Tuesday–Sunday.</p>
        </div>`;
      return;
    }

    const weekly = allDigests.filter(d => d.type === 'weekly');
    const daily = allDigests.filter(d => d.type === 'daily');
    let html = '';

    if (weekly.length) {
      html += '<div class="section-label">📋 Weekly Deep-Dives</div>';
      weekly.forEach(d => html += cardHTML(d));
    }
    if (daily.length) {
      html += '<div class="section-label">⚡ Daily Updates</div>';
      daily.forEach(d => html += cardHTML(d));
    }

    container.innerHTML = html;
  }

  function cardHTML(d) {
    const date = new Date(d.date);
    const formatted = date.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    const hasAU = d.hasAustralianAlert ? '🇦🇺 ' : '';
    return `
      <div class="digest-card ${d.type}" onclick="openDigest('${d.filename}', '${d.type}', '${formatted}', '${d.title}')">
        <div class="card-top">
          <span class="type-badge">${d.type === 'weekly' ? '📋 Weekly' : '⚡ Daily'}</span>
          <span class="card-date">${formatted}</span>
        </div>
        <h3>${hasAU}${d.title}</h3>
        <p class="preview">${d.preview || ''}</p>
      </div>`;
  }

  async function openDigest(filename, type, date, title) {
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    document.getElementById('back-btn').classList.add('visible');
    document.getElementById('header-title').textContent = type === 'weekly' ? 'Weekly Digest' : 'Daily Update';
    document.getElementById('detail-type').textContent = type === 'weekly' ? '📋 Weekly Deep-Dive' : '⚡ Daily Update';
    document.getElementById('detail-date').textContent = date;
    document.getElementById('detail-content').innerHTML = '<div class="loading"><div class="spinner"></div>Loading…</div>';
    window.scrollTo(0, 0);

    try {
      const res = await fetch(BASE + filename + '?t=' + Date.now());
      const md = await res.text();
      document.getElementById('detail-content').innerHTML = marked.parse(md);
    } catch (e) {
      document.getElementById('detail-content').innerHTML = '<p>Could not load this digest.</p>';
    }
  }

  function showList() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    document.getElementById('back-btn').classList.remove('visible');
    document.getElementById('header-title').textContent = 'Humanitarian Digest';
    window.scrollTo(0, 0);
  }

  // Service worker registration
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  loadDigests();
</script>
</body>
</html>
