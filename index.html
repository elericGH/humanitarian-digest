<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#007B5F" />
  <meta name="description" content="Humanitarian news digest with Australian interest priority" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HumanDigest" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Humanitarian Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Montserrat:wght@700&family=Zilla+Slab:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #007B5F;
      --primary-dark: #005f49;
      --primary-light: #e6f4f0;
      --secondary: #54585A;
      --au-gold: #ffcc02;
      --danger: #c0392b;
      --bg: #f2f5f4;
      --card: #ffffff;
      --text: #000000;
      --muted: #54585A;
      --border: #d9e5e2;
      --weekly-border: #007B5F;
      --daily-border: #54585A;
    }

    body {
      font-family: 'Zilla Slab', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── HEADER ── */
    header {
      background: var(--primary);
      color: white;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header .back-btn {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 26px;
      cursor: pointer;
      padding: 0 4px 0 0;
      line-height: 1;
      flex-shrink: 0;
    }
    header .back-btn.visible { display: block; }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      flex: 1;
      min-width: 0;
    }

    .header-logo-img {
      /* ADRA brand: vertical logo minimum 66px on screen */
      height: 66px;
      width: auto;
      flex-shrink: 0;
      /* Clear space: approx. height of 'A' (~9px at 66px) on all sides —
         header padding covers top/left/bottom; right margin covers the gap side */
      margin-right: 10px;
    }

    .header-logo-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header-logo-text .logo-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: white;
      letter-spacing: 0.5px;
      line-height: 1.1;
    }

    .header-logo-text .logo-tagline {
      font-family: 'Kaushan Script', cursive;
      font-size: 10px;
      color: rgba(255,255,255,0.82);
      line-height: 1.3;
      margin-top: 1px;
    }

    .header-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: none;
      color: white;
      font-size: 19px;
      cursor: pointer;
      padding: 6px;
      opacity: 0.85;
      border-radius: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { opacity: 0.5; }

    /* ── SEARCH BAR ── */
    .search-wrap {
      padding: 12px 16px 4px;
      max-width: 680px;
      margin: 0 auto;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-box .search-icon {
      position: absolute;
      left: 12px;
      color: var(--muted);
      font-size: 15px;
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Zilla Slab', Georgia, serif;
      font-size: 14px;
      color: var(--text);
      background: var(--card);
      outline: none;
      -webkit-appearance: none;
    }
    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,123,95,0.12);
    }
    .search-box input::placeholder { color: #aab5b1; }

    .search-box .clear-btn {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      display: none;
    }
    .search-box.has-value .clear-btn { display: block; }

    /* ── FILTER CHIPS ── */
    .filter-chips {
      display: flex;
      gap: 6px;
      padding: 8px 16px 0;
      max-width: 680px;
      margin: 0 auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-chips::-webkit-scrollbar { display: none; }

    .chip {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .chip:active { opacity: 0.7; }

    /* ── MAIN ── */
    main { padding: 12px 16px 16px; max-width: 680px; margin: 0 auto; }

    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--secondary);
      margin: 16px 0 8px;
    }

    .digest-card {
      background: var(--card);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      border-left: 4px solid var(--daily-border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .digest-card:active { transform: scale(0.98); }
    .digest-card.weekly { border-left-color: var(--weekly-border); }

    .digest-card .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .digest-card .type-badge {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--primary-light);
      color: var(--primary);
    }

    .digest-card .card-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      color: var(--muted);
    }

    .digest-card h3 {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 5px;
    }

    .digest-card .preview {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    mark {
      background: rgba(0,123,95,0.15);
      color: var(--primary-dark);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── EMPTY / NO RESULTS ── */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 44px; margin-bottom: 14px; }
    .empty-state h3 { font-family: 'Montserrat', sans-serif; font-size: 17px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── DETAIL VIEW ── */
    #detail-view { display: none; }

    .digest-meta {
      background: var(--card);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .digest-meta .meta-type {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--primary);
    }

    .digest-meta .meta-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      color: var(--muted);
    }

    .digest-content {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      line-height: 1.7;
    }

    .digest-content h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .digest-content h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      margin-top: 22px;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--primary);
    }

    .digest-content h2:first-of-type {
      margin-top: 14px;
      border-bottom-color: var(--au-gold);
    }

    .digest-content p {
      font-family: 'Zilla Slab', Georgia, serif;
      font-size: 15px;
      margin-bottom: 12px;
      color: var(--text);
      line-height: 1.75;
    }

    .digest-content strong { color: var(--primary); font-weight: 600; }

    .digest-content em {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      color: var(--muted);
      font-style: normal;
      letter-spacing: 0.3px;
    }

    .digest-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 18px 0;
    }

    .digest-content ul { padding-left: 18px; margin-bottom: 12px; }

    .digest-content li {
      font-family: 'Zilla Slab', Georgia, serif;
      font-size: 15px;
      margin-bottom: 6px;
      line-height: 1.65;
    }

    .digest-content a {
      color: var(--primary);
      text-decoration: none;
      border-bottom: 1px solid rgba(0,123,95,0.35);
    }

    .digest-content blockquote {
      border-left: 3px solid var(--primary);
      padding-left: 14px;
      margin: 12px 0;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 18px;
      opacity: 0.55;
      font-family: 'Montserrat', sans-serif;
    }

    /* ── SEARCH RESULTS COUNT ── */
    .results-count {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 8px 0 2px;
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <button class="back-btn" id="back-btn" onclick="showList()">‹</button>

  <div class="header-logo" id="header-logo">
    <!-- ADRA Vertical Logo — official white PNG, min 66px per brand guidelines -->
    <img src="adra-logo-white.png" alt="ADRA" class="header-logo-img" />

    <div class="header-logo-text" id="header-logo-text">
      <span class="logo-name">Humanitarian Digest</span>
      <span class="logo-tagline">Justice. Compassion. Love.</span>
    </div>
  </div>

  <div class="header-actions">
    <button class="icon-btn" onclick="loadDigests()" title="Refresh">↻</button>
  </div>
</header>

<!-- ── SEARCH + FILTERS (list view only) ── -->
<div id="search-area">
  <div class="search-wrap">
    <div class="search-box" id="search-box">
      <span class="search-icon">🔍</span>
      <input type="search" id="search-input" placeholder="Search digests…" oninput="onSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="clear-btn" onclick="clearSearch()" aria-label="Clear search">✕</button>
    </div>
  </div>
  <div class="filter-chips" id="filter-chips">
    <button class="chip active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="chip" data-filter="weekly" onclick="setFilter('weekly')">📋 Weekly</button>
    <button class="chip" data-filter="daily" onclick="setFilter('daily')">⚡ Daily</button>
    <button class="chip" data-filter="au" onclick="setFilter('au')">🇦🇺 Australia</button>
  </div>
</div>

<main>
  <!-- LIST VIEW -->
  <div id="list-view">
    <div id="digests-container">
      <div class="loading"><div class="spinner"></div>Loading digests…</div>
    </div>
    <div class="footer-note">🇦🇺 Australian interest priority · Updated automatically</div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view">
    <div class="digest-meta">
      <span class="meta-type" id="detail-type"></span>
      <span class="meta-date" id="detail-date"></span>
    </div>
    <div class="digest-content" id="detail-content"></div>
    <div class="footer-note" style="margin-top:16px;">End of digest · Justice. Compassion. Love.</div>
  </div>
</main>

<script>
  const BASE = './digests/';
  let allDigests = [];
  let activeFilter = 'all';
  let searchQuery = '';

  // ── LOAD ──
  async function loadDigests() {
    document.getElementById('digests-container').innerHTML =
      '<div class="loading"><div class="spinner"></div>Loading digests…</div>';
    try {
      const res = await fetch(BASE + 'index.json?t=' + Date.now());
      const data = await res.json();
      allDigests = data.sort((a, b) => new Date(b.date) - new Date(a.date));
      renderList();
    } catch (e) {
      document.getElementById('digests-container').innerHTML = `
        <div class="empty-state">
          <div class="icon">🌍</div>
          <h3>No digests yet</h3>
          <p>Your first digest will appear here Monday at 8am.<br>Daily updates follow Tuesday–Sunday.</p>
        </div>`;
    }
  }

  // ── FILTER + SEARCH ──
  function getFiltered() {
    let items = allDigests;
    if (activeFilter === 'weekly') items = items.filter(d => d.type === 'weekly');
    else if (activeFilter === 'daily') items = items.filter(d => d.type === 'daily');
    else if (activeFilter === 'au') items = items.filter(d => d.hasAustralianAlert);
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      items = items.filter(d =>
        (d.title || '').toLowerCase().includes(q) ||
        (d.preview || '').toLowerCase().includes(q)
      );
    }
    return items;
  }

  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.chip').forEach(c => {
      c.classList.toggle('active', c.dataset.filter === f);
    });
    renderList();
  }

  function onSearch(val) {
    searchQuery = val;
    const box = document.getElementById('search-box');
    box.classList.toggle('has-value', val.length > 0);
    renderList();
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    onSearch('');
  }

  // ── HIGHLIGHT search matches ──
  function highlight(text, query) {
    if (!query.trim()) return text;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
  }

  // ── RENDER LIST ──
  function renderList() {
    const container = document.getElementById('digests-container');
    const items = getFiltered();

    if (!allDigests.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">🌍</div>
          <h3>No digests yet</h3>
          <p>Your first digest will appear here Monday at 8am.<br>Daily updates follow Tuesday–Sunday.</p>
        </div>`;
      return;
    }

    if (!items.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">🔍</div>
          <h3>No results</h3>
          <p>Try a different search term or filter.</p>
        </div>`;
      return;
    }

    const weekly = items.filter(d => d.type === 'weekly');
    const daily  = items.filter(d => d.type === 'daily');
    const q = searchQuery;
    let html = '';

    if (searchQuery || activeFilter !== 'all') {
      html += `<div class="results-count">${items.length} result${items.length !== 1 ? 's' : ''}</div>`;
    }

    if (weekly.length) {
      html += '<div class="section-label">📋 Weekly Deep-Dives</div>';
      weekly.forEach(d => html += cardHTML(d, q));
    }
    if (daily.length) {
      html += '<div class="section-label">⚡ Daily Updates</div>';
      daily.forEach(d => html += cardHTML(d, q));
    }

    container.innerHTML = html;
  }

  function cardHTML(d, q) {
    const date = new Date(d.date);
    const formatted = date.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    const auBadge = d.hasAustralianAlert ? '🇦🇺 ' : '';
    const title   = highlight(d.title || '', q);
    const preview = highlight(d.preview || '', q);
    return `
      <div class="digest-card ${d.type}" onclick="openDigest('${d.filename}', '${d.type}', '${formatted}', '${(d.title||'').replace(/'/g,"\\'")}')">
        <div class="card-top">
          <span class="type-badge">${d.type === 'weekly' ? '📋 Weekly' : '⚡ Daily'}</span>
          <span class="card-date">${formatted}</span>
        </div>
        <h3>${auBadge}${title}</h3>
        <p class="preview">${preview}</p>
      </div>`;
  }

  // ── OPEN DIGEST ──
  async function openDigest(filename, type, date, title) {
    document.getElementById('list-view').style.display   = 'none';
    document.getElementById('detail-view').style.display = 'block';
    document.getElementById('search-area').style.display = 'none';
    document.getElementById('back-btn').classList.add('visible');
    document.getElementById('header-logo-text').querySelector('.logo-name').textContent =
      type === 'weekly' ? 'Weekly Digest' : 'Daily Update';
    document.getElementById('detail-type').textContent =
      type === 'weekly' ? '📋 Weekly Deep-Dive' : '⚡ Daily Update';
    document.getElementById('detail-date').textContent = date;
    document.getElementById('detail-content').innerHTML =
      '<div class="loading"><div class="spinner"></div>Loading…</div>';
    window.scrollTo(0, 0);

    try {
      const res = await fetch(BASE + filename + '?t=' + Date.now());
      const md  = await res.text();
      document.getElementById('detail-content').innerHTML = marked.parse(md);
    } catch (e) {
      document.getElementById('detail-content').innerHTML = '<p>Could not load this digest.</p>';
    }
  }

  // ── BACK ──
  function showList() {
    document.getElementById('detail-view').style.display   = 'none';
    document.getElementById('list-view').style.display     = 'block';
    document.getElementById('search-area').style.display   = 'block';
    document.getElementById('back-btn').classList.remove('visible');
    document.getElementById('header-logo-text').querySelector('.logo-name').textContent = 'Humanitarian Digest';
    window.scrollTo(0, 0);
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  loadDigests();
</script>
</body>
</html>
